name: Update Cookie Filter List

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download latest rules.js
        run: curl -o rules.js https://raw.githubusercontent.com/OhMyGuus/I-Still-Dont-Care-About-Cookies/master/src/data/rules.js

      - name: Advanced Conversion to uBlock
        run: |
          python3 -c '
          import re
          from datetime import datetime

          content = open("rules.js", encoding="utf-8").read()

          # Commons
          commons = {}
          for m in re.finditer(r"(\d+):\s*["'"'"'"](.*?)["'"'"'"]", re.search(r"const commons = \{(.+?)\n\};", content, re.DOTALL).group(1), re.DOTALL):
              commons[m.group(1)] = m.group(2).strip()

          # Rules - more aggressive parsing
          rules_str = re.search(r"const rules = \{(.+?)\n\};", content, re.DOTALL | re.MULTILINE).group(1)

          with open("i-still-dont-care-ublock.txt", "w", encoding="utf-8") as f:
              f.write(f"! I-Still-Dont-Care-About-Cookies → uBlock Origin\n")
              f.write(f"! Updated: {datetime.now().strftime("%Y-%m-%d %H:%M UTC")}\n")
              f.write("! Total domains processed: many\n\n")

              f.write("##.cookie,###cookie,##.gdpr,###gdpr,##.consent,###consent\n")
              f.write("##.modal-backdrop,##.veil,##.overlay\n\n")

              # Better pattern to catch more entries
              for m in re.finditer(r"\"([^\"]+)\":\s*\{(.*?)\}(?=,|\s*\"|\s*\n\s*\})", rules_str, re.DOTALL):
                  domain = m.group(1)
                  body = m.group(2)

                  written = False

                  # CSS selectors
                  for s in re.findall(r"s:\s*[\"'`](.+?)[\"'`]", body, re.DOTALL):
                      clean = re.sub(r"\{[^}]+\}", "", s).strip()
                      if clean and len(clean) > 3:
                          f.write(f"{domain}##{clean}\n")
                          written = True

                  # Commons references
                  for c in re.findall(r"c:\s*(\d+)", body):
                      if c in commons:
                          f.write(f"{domain}##{commons[c]}\n")
                          written = True

                  # JS handlers
                  for j in re.findall(r"j:\s*[\"'']?(\d+)", body):
                      handler = {"5": "click-handler", "8": "google-handler", "6": "cookie-handler"}.get(j, "click-handler")
                      f.write(f"{domain}##+js({handler})\n")
                      written = True

              print("✅ Conversion finished")
          '

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add i-still-dont-care-ublock.txt
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "Auto-update filter list $(date -u +"%Y-%m-%d")"
            git push
          fi
